<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PDF viewer</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: #f1f1f1;
      font-family: sans-serif;
    }

    .wrap {
      width: 100%;
      height: 100vh;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: white;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <iframe
      src="https://mozilla.github.io/pdf.js/web/viewer.html?file=https%3A%2F%2Fmomusmedia.nl%2Fwp-content%2Fuploads%2F2026%2F04%2FACTIZ268_administratieve_lasten_A0.pdf">
    </iframe>
  </div>
</body>
</html>
