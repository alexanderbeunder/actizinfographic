<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SVG viewer</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #f5f5f5;
      font-family: sans-serif;
    }

    #toolbar {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 10;
      display: flex;
      gap: 8px;
      background: rgba(255,255,255,0.9);
      padding: 8px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }

    #toolbar button {
      font-size: 16px;
      padding: 6px 10px;
      cursor: pointer;
    }

    #viewer {
      width: 100vw;
      height: 100vh;
    }

    svg {
      width: 100%;
      height: 100%;
      display: block;
      touch-action: none;
      cursor: grab;
    }

    svg.dragging {
      cursor: grabbing;
    }
  </style>
</head>
<body>
  <div id="toolbar">
    <button id="zoom-in">+</button>
    <button id="zoom-out">−</button>
    <button id="reset">Reset</button>
  </div>

  <div id="viewer"></div>

  <script>
    fetch('ACTIZ268_administratieve_lasten_A0 2.svg')
      .then(r => r.text())
      .then(svgText => {
        const viewer = document.getElementById('viewer');
        viewer.innerHTML = svgText;

        const svg = viewer.querySelector('svg');
        if (!svg) return;

        const vb = svg.viewBox.baseVal;
        const initial = {
          x: vb.x,
          y: vb.y,
          width: vb.width,
          height: vb.height
        };

        let state = { ...initial };
        let isDragging = false;
        let startPoint = null;
        let startViewBox = null;

        function setViewBox() {
          svg.setAttribute(
            'viewBox',
            `${state.x} ${state.y} ${state.width} ${state.height}`
          );
        }

        function zoom(factor) {
          const cx = state.x + state.width / 2;
          const cy = state.y + state.height / 2;
          state.width *= factor;
          state.height *= factor;
          state.x = cx - state.width / 2;
          state.y = cy - state.height / 2;
          setViewBox();
        }

        svg.addEventListener('wheel', (e) => {
          e.preventDefault();
          const factor = e.deltaY < 0 ? 0.9 : 1.1;
          zoom(factor);
        }, { passive: false });

        svg.addEventListener('mousedown', (e) => {
          isDragging = true;
          svg.classList.add('dragging');
          startPoint = { x: e.clientX, y: e.clientY };
          startViewBox = { ...state };
        });

        window.addEventListener('mousemove', (e) => {
          if (!isDragging) return;
          const dx = e.clientX - startPoint.x;
          const dy = e.clientY - startPoint.y;

          const scaleX = startViewBox.width / svg.clientWidth;
          const scaleY = startViewBox.height / svg.clientHeight;

          state.x = startViewBox.x - dx * scaleX;
          state.y = startViewBox.y - dy * scaleY;
          setViewBox();
        });

        window.addEventListener('mouseup', () => {
          isDragging = false;
          svg.classList.remove('dragging');
        });

        document.getElementById('zoom-in').addEventListener('click', () => zoom(0.9));
        document.getElementById('zoom-out').addEventListener('click', () => zoom(1.1));
        document.getElementById('reset').addEventListener('click', () => {
          state = { ...initial };
          setViewBox();
        });

        setViewBox();
      });
  </script>
</body>
</html>
